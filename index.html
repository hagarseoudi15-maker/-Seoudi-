<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى وأحسن أب ❤️</title>
    <style>
        :root { --navy: #0f172a; --gold: #fbbf24; --slate: #f8fafc; }
        body { margin: 0; padding: 0; background: var(--slate); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 90%; max-width: 450px; text-align: center; animation: fadeIn 1.2s ease; }
        .main-card { background: #ffffff; padding: 35px 25px; border-radius: 30px; box-shadow: 0 25px 50px rgba(15, 23, 42, 0.1); border-top: 10px solid var(--navy); border-bottom: 5px solid var(--gold); }
        .photo-album { position: relative; height: 160px; margin-bottom: 25px; }
        .papa-img { width: 140px; height: 140px; border-radius: 20px; object-fit: cover; border: 4px solid var(--slate); box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: fadeSlide 16s ease-in-out infinite; opacity: 0; position: absolute; top: 0; left: calc(50% - 70px); }
        .papa-img:nth-child(1) { animation-delay: 0s; }
        .papa-img:nth-child(2) { animation-delay: 4s; }
        .papa-img:nth-child(3) { animation-delay: 8s; }
        .papa-img:nth-child(4) { animation-delay: 12s; }
        h1 { color: var(--navy); font-size: 26px; margin: 10px 0; }
        .nickname { color: #b45309; font-size: 19px; font-weight: bold; display: block; margin-bottom: 15px; }
        #msg-display { background: #fefce8; padding: 20px; border-radius: 15px; color: var(--navy); min-height: 80px; border-right: 5px solid var(--gold); font-size: 16px; line-height: 1.7; transition: 0.4s; display: flex; align-items: center; justify-content: center; font-weight: 500; }
        .btn-action { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; margin-top: 25px; font-weight: bold; width: 100%; font-size: 16px; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 25px; }
        .time-box { background: var(--navy); color: white; padding: 12px 5px; border-radius: 12px; }
        .time-box span { display: block; font-size: 18px; font-weight: 800; color: var(--gold); }
        @keyframes fadeSlide { 0% { opacity: 0; transform: scale(0.95); } 5% { opacity: 1; transform: scale(1); } 20% { opacity: 1; } 25% { opacity: 0; } 100% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <div class="main-card">
        <div class="photo-album">
            <img src="papa1.jpg" alt="بابا 1" class="papa-img">
            <img src="papa2.jpg" alt="بابا 2" class="papa-img">
            <img src="papa3.jpg" alt="بابا 3" class="papa-img">
            <img src="papa4.jpg" alt="بابا 4" class="papa-img">
        </div>
        <h1>أغلى وأحسن أب في الدنيا ❤️</h1>
        <span class="nickname">حبيبي يا "سعودي" ✨</span>
        <div id="msg-display">يا رب يا بابا يبارك في عمرك ويخليك لينا تاج فوق راسنا.. إنت أغلى إنسان في حياتي.</div>
        <button class="btn-action" onclick="changeMessage()">اضغط هنا يا حبيبي 🎁</button>
        <div class="timer-grid" id="timer"></div>
        <p style="margin-top: 25px; font-size: 13px; color: #64748b;">بنتك هاجر اللي بتفتخر بيك دايماً ❤️</p>
    </div>
</div>
<script>
    const messages = [
        "إنت مش بس أب، إنت السند والظهر اللي مبيملش.. ❤️",
        "لو لفيت الدنيا كلها مش هلاقي قلب أحن من قلبك.. 🌟",
        "ربنا يطول في عمرك ويخلي ضحكتك منورة البيت.. 💙",
        "إنت البطل الحقيقي في قصتي، بحبك جداً يا بابا.. ✨",
        "أغلى وأحسن أب هو اللي خلاني فخورة باسمه دايماً.. 👑",
        "يا رب يرزقك الصحة والراحة يا أغلى "سعودي" في الكوكب.. 🌸",
        "شكراً إنك دايماً واقف جنبي ومصدق فيّ.. 💎"
    ];
    let msgIndex = 0;
    function changeMessage() {
        const display = document.getElementById('msg-display');
        display.style.opacity = 0;
        setTimeout(() => {
            msgIndex = (msgIndex + 1) % messages.length;
            display.innerText = messages[msgIndex];
            display.style.opacity = 1;
        }, 300);
    }
    const birthDate = new Date(1985, 2, 9); 
    function updateTimer() {
        const diff = new Date() - birthDate;
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff / 3600000) % 24);
        const m = Math.floor((diff / 60000) % 60);
        const s = Math.floor((diff / 1000) % 60);
        document.getElementById('timer').innerHTML = `
            <div class="time-box"><span>${d}</span><small>يوم</small></div>
            <div class="time-box"><span>${h}</span><small>ساعة</small></div>
            <div class="time-box"><span>${m}</span><small>دقيقة</small></div>
            <div class="time-box"><span>${s}</span><small>ثانية</small></div>
        `;
    }
    setInterval(updateTimer, 1000); updateTimer();
</script>
</body>
</html>
